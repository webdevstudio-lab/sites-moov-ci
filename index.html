      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f6f9;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      :root {
        --blue: #0071ce;
        --blue-dark: #005aaa;
        --blue-light: #e8f3fc;
      }

      header {
        background: var(--blue);
        color: white;
        padding: 11px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }
      .logo {
        width: 34px;
        height: 34px;
        background: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      header h1 {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.2;
      }
      header p {
        font-size: 11px;
        opacity: 0.75;
        margin-top: 1px;
      }
      .badge {
        margin-left: auto;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* SIDEBAR */
      .sidebar {
        width: 320px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        background: white;
        border-right: 1px solid #e5e7eb;
      }
      .search-box {
        padding: 11px 12px;
        border-bottom: 1px solid #f0f0f0;
        flex-shrink: 0;
      }
      .search-wrap {
        position: relative;
      }
      .ico-search {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
      }
      #search {
        width: 100%;
        padding: 9px 34px 9px 34px;
        border: 1.5px solid #e5e7eb;
        border-radius: 10px;
        font-size: 13px;
        outline: none;
        background: #f9fafb;
        color: #111;
        transition: border 0.2s;
      }
      #search:focus {
        border-color: var(--blue);
        background: white;
        box-shadow: 0 0 0 3px rgba(0, 113, 206, 0.1);
      }
      .clear-btn {
        position: absolute;
        right: 9px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #9ca3af;
        display: none;
        padding: 3px;
        line-height: 0;
      }
      .results-info {
        padding: 5px 12px 3px;
        font-size: 11px;
        color: #9ca3af;
        flex-shrink: 0;
      }
      .sites-list {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #e5e7eb transparent;
      }
      .sites-list::-webkit-scrollbar {
        width: 4px;
      }
      .sites-list::-webkit-scrollbar-thumb {
        background: #e5e7eb;
        border-radius: 4px;
      }
      .site-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        cursor: pointer;
        border-bottom: 1px solid #f7f7f7;
        transition: background 0.12s;
      }
      .site-item:hover {
        background: #f0f7ff;
      }
      .site-item.active {
        background: var(--blue-light);
      }
      .site-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--blue-light);
        color: var(--blue);
        font-weight: 700;
        font-size: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        letter-spacing: 0.5px;
        text-align: center;
      }
      .site-item.active .site-avatar {
        background: var(--blue);
        color: white;
      }
      .site-name {
        font-size: 12.5px;
        font-weight: 500;
        color: #1f2937;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .site-coords {
        font-size: 10.5px;
        color: #9ca3af;
        margin-top: 1px;
      }
      .chev {
        margin-left: auto;
        flex-shrink: 0;
        color: #d1d5db;
      }
      .empty {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        gap: 8px;
        color: #9ca3af;
        font-size: 13px;
      }

      /* FICHE DESKTOP */
      .site-card {
        display: none;
        border-top: 1px solid #e5e7eb;
        padding: 13px 12px 14px;
        background: #fafafa;
        flex-shrink: 0;
      }
      .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 11px;
      }
      .card-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: var(--blue-light);
        color: var(--blue);
        font-weight: 700;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .card-name {
        font-size: 14px;
        font-weight: 600;
        color: #1f2937;
        line-height: 1.3;
      }
      .card-coords {
        font-size: 10.5px;
        color: #9ca3af;
        margin-top: 2px;
      }
      .btn-row {
        display: flex;
        gap: 8px;
      }
      .btn-nav {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 6px;
        border-radius: 9px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        border: none;
        transition: opacity 0.15s;
      }
      .btn-nav:hover {
        opacity: 0.85;
      }
      .btn-gmaps {
        background: var(--blue);
        color: white;
      }
      .btn-waze {
        background: #06d6a0;
        color: #003d2e;
      }

      /* MAP AREA */
      .map-area {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      #gmap {
        width: 100%;
        height: 100%;
        border: none;
      }
      .map-hint {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        font-size: 12px;
        padding: 6px 14px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
        opacity: 1;
        transition: opacity 0.5s;
      }
      .map-hint.hide {
        opacity: 0;
      }

      /* MOBILE */
      @media (max-width: 768px) {
        body {
          overflow: auto;
        }
        .main {
          flex-direction: column;
          overflow: visible;
        }
        .sidebar {
          width: 100%;
          height: auto;
          border-right: none;
          border-bottom: 1px solid #e5e7eb;
          overflow: visible;
        }
        .sites-list {
          max-height: 240px;
        }
        .map-area {
          height: 55vw;
          min-height: 240px;
          max-height: 380px;
          flex: none;
        }
        .site-card {
          display: none !important;
        }
        .mobile-panel {
          display: block;
        }
      }
      @media (min-width: 769px) {
        .mobile-panel {
          display: none !important;
        }
      }

      /* MOBILE PANEL */
      .mobile-panel {
        display: none;
        padding: 12px;
        border-top: 1px solid #e5e7eb;
        background: #fafafa;
      }
      .mob-header {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 10px;
      }
      .mob-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--blue-light);
        color: var(--blue);
        font-weight: 700;
        font-size: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .mob-name {
        font-size: 13px;
        font-weight: 600;
        color: #1f2937;
      }
      .mob-coords {
        font-size: 10.5px;
        color: #9ca3af;
        margin-top: 2px;
      }
      .mob-close {
        margin-left: auto;
        background: none;
        border: none;
        cursor: pointer;
        color: #9ca3af;
        padding: 2px;
      }
    </style>
  </head>

            .replace(/_/g, " ")
            .split(/\s+/)
            .slice(0, 2)
            .map((w) => w[0] || "")
            .join("")
            .toUpperCase() || "M"
        );
      }

      function selectSite(idx) {
        selectedIdx = idx;
        const s = SITES[idx];
        const ini = initials(s.name);
        const gmaps = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`;
        const waze = `https://waze.com/ul?ll=${s.lat},${s.lng}&navigate=yes`;
        const coords = `${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}`;

        // Update map via embed URL with marker
        const mapSrc = `https://maps.google.com/maps?q=${s.lat},${s.lng}&z=15&output=embed&markers=${s.lat},${s.lng}`;
        document.getElementById("gmap").src = mapSrc;

        if (isMobile()) {
          document.getElementById("m-avatar").textContent = ini;
          document.getElementById("m-name").textContent = s.name.replace(
            /_/g,
            " ",
          );
          document.getElementById("m-coords").textContent = coords;
          document.getElementById("m-gmaps").href = gmaps;
          document.getElementById("m-waze").href = waze;
          document.getElementById("mobile-panel").style.display = "block";
        } else {
          document.getElementById("c-avatar").textContent = ini;
          document.getElementById("c-name").textContent = s.name.replace(
            /_/g,
            " ",
          );
          document.getElementById("c-coords").textContent = coords;
          document.getElementById("c-gmaps").href = gmaps;
          document.getElementById("c-waze").href = waze;
          document.getElementById("site-card").style.display = "block";
        }

        renderList(filteredSites);
      }

      function closePanel() {
        selectedIdx = null;
        document.getElementById("mobile-panel").style.display = "none";
        document.getElementById("site-card").style.display = "none";
        renderList(filteredSites);
      }

      function renderList(sites) {
        const list = document.getElementById("sites-list");
        const empty = document.getElementById("empty");
        const count = sites.length;
        const total = SITES.length;

        document.getElementById("results-info").textContent =
          count === total
            ? `${total.toLocaleString("fr")} sites`
            : `${count} résultat${count > 1 ? "s" : ""}`;
        document.getElementById("badge").textContent =
          count === total
            ? `${total.toLocaleString("fr")} sites`
            : `${count} / ${total}`;

        if (count === 0) {
          list.style.display = "none";
          empty.style.display = "flex";
          return;
        }
        list.style.display = "block";
        empty.style.display = "none";

        const MAX = 150;
        const shown = sites.slice(0, MAX);
        list.innerHTML = shown
          .map((s) => {
            const realIdx = SITES.indexOf(s);
            const active = realIdx === selectedIdx;
            const ini = initials(s.name);
            const label = s.name.replace(/_/g, " ");
            return `<div class="site-item${active ? " active" : ""}" onclick="selectSite(${realIdx})">
      <div class="site-avatar">${ini}</div>
      <div style="flex:1;min-width:0">
        <div class="site-name">${label}</div>
        <div class="site-coords">${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}</div>
      </div>
      <div class="chev"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`;
          })
          .join("");

        if (count > MAX) {
          list.innerHTML += `<div style="padding:9px 12px;text-align:center;font-size:11px;color:#9ca3af;border-top:1px solid #f0f0f0">
      ${count - MAX} autres — affinez la recherche
    </div>`;
        }
      }

      document.getElementById("search").addEventListener("input", function () {
        const q = this.value.trim().toLowerCase();
        document.getElementById("clear-btn").style.display = q
          ? "block"
          : "none";
        filteredSites = q
          ? SITES.filter(
              (s) =>
                s.name.toLowerCase().includes(q) ||
                s.name.replace(/_/g, " ").toLowerCase().includes(q),
            )
          : SITES;
        renderList(filteredSites);
      });

      function clearSearch() {
        document.getElementById("search").value = "";
        document.getElementById("clear-btn").style.display = "none";
        filteredSites = SITES;
        renderList(SITES);
      }

      renderList(SITES);
    </script>
  </body>
</html>
